services:
  db:
    image: postgres:17-alpine
    container_name: back_challenge_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: back_challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d back_challenge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
